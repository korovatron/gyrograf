<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover is required for iOS safe area env() variables to work -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Gyrograf</title>
    <link rel="icon" type="image/png" sizes="192x192" href="./images/appIcon_192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./images/appIcon_180.png" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#1A2F42" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Gyrograf" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout" id="layoutRoot">
      <section class="panel" id="controlPanel" aria-label="Gyrograf Controls">
        <button id="panelTab" class="panel-tab" type="button" aria-label="Toggle controls panel" aria-expanded="true"></button>
        <div class="panel-inner">
        <img src="./images/logo.png" alt="Gyrograf" class="panel-logo" draggable="false">
        <p class="subtitle">Fresh curves, gyros-style</p>

        <label>
          Ring piece
          <select id="ringPiece"></select>
        </label>

        <label>
          Track
          <select id="track"></select>
        </label>

        <label>
          Wheel
          <select id="smallTeeth"></select>
        </label>

        <div class="colour-row">
          <label>
            Ink
            <input id="inkColour" type="color" value="#c400ff" />
          </label>
          <label>
            Paper
            <input id="paperColour" type="color" value="#fde9d4" />
          </label>
        </div>

        <label>
          Pen width
          <input id="strokeWidth" type="range" min="1" max="4" value="2" />
        </label>

        <div class="actions">
          <button id="clearTrace" type="button">Clear<br>trace</button>
          <button id="toggleGear" type="button">Hide<br>gear</button>
          <button id="resetView" type="button">Reset<br>view</button>
        </div>

        </div>
      </section>

      <section class="stage-wrap" aria-label="Drawing stage">
        <canvas id="stage" width="1100" height="760"></canvas>
      </section>
    </main>

    <script src="./app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js', { scope: './' })
          .catch((err) => console.error('Service Worker registration failed:', err));
      }
    </script>
  </body>
</html>
