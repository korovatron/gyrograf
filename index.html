<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gyrograf</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout" id="layoutRoot">
      <button id="panelToggle" class="panel-toggle" type="button" aria-expanded="true">Hide controls</button>

      <section class="panel" id="controlPanel" aria-label="Gyrograf Controls">
        <h1>Gyrograf</h1>
        <p class="subtitle">1960s spirograph, reimagined for the browser.</p>

        <label>
          Ring piece
          <select id="ringPiece"></select>
        </label>

        <label>
          Track
          <select id="track"></select>
        </label>

        <label>
          Wheel
          <select id="smallTeeth"></select>
        </label>

        <p class="gear-note" id="ringMeta"></p>
        <p class="gear-note" id="wheelMeta"></p>

        <label>
          Ink colour
          <input id="inkColour" type="color" value="#ff0000" />
        </label>

        <label>
          Paper colour
          <input id="paperColour" type="color" value="#fde9d4" />
        </label>

        <label>
          Stroke width
          <input id="strokeWidth" type="range" min="1" max="4" value="2" />
        </label>

        <div class="actions">
          <button id="clearTrace" type="button">Clear trace</button>
          <button id="resetWheel" type="button">Reset wheel</button>
          <button id="resetView" type="button">Reset view</button>
        </div>

        <p class="help">
          Click and hold any pen-hole on the small ring, then drag to roll it around the big ring.
          The wheel stays meshed even if you push in the "wrong" direction.
        </p>
      </section>

      <section class="stage-wrap" aria-label="Drawing stage">
        <canvas id="stage" width="1100" height="760"></canvas>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
